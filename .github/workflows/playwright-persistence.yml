name: Regression Gate - Persistence

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  persistence-regression:
    name: Playwright Persistence (Chromium)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/CMNetwork.ClientApp

    env:
      BASE_URL: ${{ secrets.E2E_BASE_URL != '' && secrets.E2E_BASE_URL || 'http://cmnetwork.runasp.net' }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: src/CMNetwork.ClientApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run persistence suite
        run: npm run test:e2e:persistence

      - name: Upload persistence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-persistence-report
          path: src/CMNetwork.ClientApp/playwright-report/persistence

      - name: Upload persistence test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-persistence-results
          path: src/CMNetwork.ClientApp/test-results
