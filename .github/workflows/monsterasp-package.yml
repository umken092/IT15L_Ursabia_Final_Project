name: CI / Deploy → Render

# ─── Triggers ────────────────────────────────────────────────────────────────
# • PRs to main  → quality gates only (no deploy)
# • Push to main → quality gates, then deploy to Render via deploy hook
# • workflow_dispatch → manual trigger of the full pipeline
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   RENDER_DEPLOY_HOOK_URL   Render dashboard → Service → Deploy → Deploy Hook URL
#
# Required GitHub variables (Settings → Variables → Actions):
#   RENDER_API_URL           e.g. https://cmnetwork-api.onrender.com
#                            Used for the post-deploy smoke test.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Quality Gates ──────────────────────────────────────────────────────
  # Runs on every PR and push. Blocks the deploy job if anything fails.
  quality:
    name: Quality Gates
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: src/CMNetwork.ClientApp/package-lock.json

      - name: Frontend install
        working-directory: src/CMNetwork.ClientApp
        run: npm ci

      - name: Frontend lint
        working-directory: src/CMNetwork.ClientApp
        run: npm run lint

      - name: Frontend build
        working-directory: src/CMNetwork.ClientApp
        run: npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Backend build
        run: dotnet build CMNetwork.sln --configuration Release

  # ── 2. Deploy to Render ───────────────────────────────────────────────────
  # Triggers the Render deploy hook, which causes Render to pull the latest
  # commit, rebuild the Docker image, and swap to the new container.
  # The Dockerfile at the repo root handles the full self-contained build.
  deploy:
    name: Deploy → Render
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: https://it15l-ursabia-final-project.onrender.com

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy hook triggered. Render is building and deploying."

  # ── 3. Smoke Test ─────────────────────────────────────────────────────────
  # Polls the health endpoint for up to 8 minutes, then fails if unreachable.
  smoke:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest

    env:
      RENDER_API_URL: https://it15l-ursabia-final-project.onrender.com

    steps:
      - name: Wait for Render deploy to go live
        run: |
          URL="${RENDER_API_URL}/api/auth/health"
          echo "Polling $URL …"
          MAX=48   # 48 × 10s = 480s ≈ 8 min
          COUNT=0
          until curl -fsS -o /dev/null "$URL"; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -ge $MAX ]; then
              echo "Health check timed out after ${MAX} retries."
              exit 1
            fi
            echo "Not ready yet (attempt $COUNT/$MAX) — waiting 10s …"
            sleep 10
          done
          echo "Health check passed."