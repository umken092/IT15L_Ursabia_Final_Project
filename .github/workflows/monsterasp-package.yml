name: CI / Deploy → MonsterAsp

# ─── Triggers ────────────────────────────────────────────────────────────────
# • PRs to main  → quality gates only (no deploy)
# • Push to main → quality gates, then auto-deploy via WebDeploy
# • workflow_dispatch → manual trigger of the full pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Quality Gates ──────────────────────────────────────────────────────
  # Runs on every PR and push. Blocks the deploy job if anything fails.
  quality:
    name: Quality Gates
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: src/CMNetwork.ClientApp/package-lock.json

      - name: Frontend install
        working-directory: src/CMNetwork.ClientApp
        run: npm ci

      - name: Frontend lint
        working-directory: src/CMNetwork.ClientApp
        run: npm run lint

      - name: Frontend build
        working-directory: src/CMNetwork.ClientApp
        run: npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Backend build
        run: dotnet build CMNetwork.sln --configuration Release

  # ── 2. Deploy to MonsterAsp ───────────────────────────────────────────────
  # Runs only on push to main, after quality gates pass.
  # Uses WebDeploy (MSDeploy) to push the self-contained publish output to
  # the MonsterAsp site. MonsterAsp's panel "GitHub Deploy" only does a raw
  # git-clone — it does NOT build; this job is the correct alternative.
  #
  # Required GitHub secrets (Settings → Secrets → Actions):
  #   MONSTERASP_WEBSITE_NAME   e.g.  site12345
  #   MONSTERASP_SERVER_URL     e.g.  https://site12345.siteasp.net:8172
  #   MONSTERASP_USERNAME       e.g.  site12345
  #   MONSTERASP_PASSWORD       WebDeploy password from MonsterAsp control panel
  #
  # How to get these values:
  #   MonsterAsp control panel → Deploy (FTP/WebDeploy/Git) → Enable WebDeploy
  deploy:
    name: Deploy → MonsterAsp
    needs: quality
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: http://cmnetwork.runasp.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: src/CMNetwork.ClientApp/package-lock.json

      - name: Frontend install
        working-directory: src/CMNetwork.ClientApp
        run: npm ci

      - name: Frontend build (included in publish output)
        working-directory: src/CMNetwork.ClientApp
        run: npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Self-contained win-x64 publish — MonsterAsp server has no .NET 10 runtime.
      # SkipSpaBuild=true because we already built the frontend above.
      - name: Self-contained publish (win-x64)
        run: >
          dotnet publish src/CMNetwork.WebApi/CMNetwork.WebApi.csproj
          --configuration Release
          --self-contained true
          --runtime win-x64
          --output ./publish-sc
          /p:SkipSpaBuild=true

      # IIS on MonsterAsp requires processPath to point to the .exe, not dotnet.
      - name: Rewrite web.config for self-contained IIS hosting
        shell: pwsh
        run: |
          Set-Content -Path ./publish-sc/web.config -Encoding UTF8 -Value @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
                </handlers>
                <aspNetCore processPath=".\CMNetwork.WebApi.exe" stdoutLogEnabled="false" stdoutLogFile=".\logs\stdout" hostingModel="inprocess" />
              </system.webServer>
            </location>
          </configuration>
          '@

      # Direct msdeploy sync — skips app pool stop/start which is blocked on
      # MonsterAsp shared hosting. Simply syncs publish-sc/ to the site root.
      # publishUrl from MonsterAsp publishSettings has no port (uses HTTPS/443).
      - name: Deploy to MonsterAsp via WebDeploy
        shell: pwsh
        env:
          SITE: ${{ secrets.MONSTERASP_WEBSITE_NAME }}
          HOST: ${{ secrets.MONSTERASP_SERVER_URL }}
          USER: ${{ secrets.MONSTERASP_USERNAME }}
          PASS: ${{ secrets.MONSTERASP_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $src  = (Resolve-Path "./publish-sc").Path
          $dest = "https://$env:HOST/MsDeploy.axd?site=$env:SITE"
          Write-Host "Deploying $src → $dest"
          & $msdeploy `
            -verb:sync `
            -allowUntrusted `
            "-source:contentPath=$src" `
            "-dest:contentPath=$env:SITE,computerName=$dest,userName=$env:USER,password=$env:PASS,AuthType=Basic"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }